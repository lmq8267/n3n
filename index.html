<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel='icon' type='image/svg+xml'
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(124,58,237)"/><stop offset="100%" style="stop-color:rgb(6,182,212)"/></linearGradient></defs><rect width="48" height="48" rx="10" fill="url(%23g)"/><text x="24" y="32" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">N3N</text></svg>'>
    <title>n3n 配置文件生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            background: white;
            color: #667eea;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .tab-content {
            display: none;
            padding: 30px;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .section h3 {
            color: #495057;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #495057;
            font-weight: 500;
        }

        .form-group label.required::after {
            content: ' *';
            color: #dc3545;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input.error,
        .form-group select.error,
        .form-group textarea.error {
            border-color: #dc3545;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn:disabled:hover {
            transform: none;
            box-shadow: none;
        }

        .btn-download {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .output-section {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            scroll-margin-top: 20px;
        }

        .output-text {
            width: 100%;
            min-height: 300px;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.5;
            resize: vertical;
            background: white;
        }

        .copy-feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            animation: slideInRight 0.3s ease-out;
        }

        .copy-feedback.success {
            background: #28a745;
        }

        .copy-feedback.error {
            background: #dc3545;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .supernode-list {
            margin-bottom: 10px;
        }

        .supernode-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .supernode-item input {
            flex: 1;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-remove {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            /* 橙红色渐变 */
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(238, 90, 36, 0.3);
            /* 配色的阴影 */
        }

        .back-to-top:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(238, 90, 36, 0.4);
            /* 悬停时增强阴影 */
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .back-to-top svg {
            width: 24px;
            height: 24px;
        }

        .footer {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            text-align: center;
            margin-top: 40px;
            max-width: 1200px;
            /* 与容器相同的最大宽度 */
            margin-left: auto;
            /* 自动居中 */
            margin-right: auto;
            /* 自动居中 */
            position: relative;
            /* 用 margin auto 居中 */
            border-radius: 20px;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-content p {
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            font-size: 14px;
        }

        .github-link {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .github-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: white;
        }


        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .tabs {
                flex-wrap: nowrap;
                /* 禁止换行 */
                overflow-x: auto;
                /* 允许横向滚动 */
            }

            .tab {
                flex: 1;
                min-width: 120px;
                /* 设置最小宽度 */
                padding: 15px 10px;
                /* 减少内边距 */
                font-size: 14px;
                /* 减小字体 */
                white-space: nowrap;
                /* 防止文字换行 */
            }

            .back-to-top {
                bottom: 60px;
                right: 20px;
                width: 45px;
                height: 45px;
            }

            .footer {
                margin-left: 20px;
                margin-right: 20px;
            }

            .footer-content {
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>
                <a href="https://github.com/n42n/n3n" target="_blank" style="text-decoration: none; color: inherit;">
                    n3n
                </a>
                <a href="https://github.com/lmq8267/n3n" target="_blank" style="text-decoration: none; color: inherit;">
                    配置文件生成器
                </a>
            </h1>
            <p>为 edge 和 supernode 生成配置文件</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('edge')">客户端 (Edge)</div>
            <div class="tab" onclick="switchTab('supernode')">服务端 (Supernode)</div>
        </div>

        <!-- Edge Configuration -->
        <div id="edge-tab" class="tab-content active">
            <div class="section">
                <h3>社区设置</h3>
                <div class="form-group">
                    <label for="edge-community-name" class="required">社区名称</label>
                    <input type="text" id="edge-community-name" placeholder="mynetwork" data-required="true">
                </div>
                <div class="form-group">
                    <label for="edge-community-key">加密密钥</label>
                    <input type="text" id="edge-community-key" placeholder="留空则不加密">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-header-encryption">
                    <label for="edge-header-encryption">启用头部加密</label>
                </div><br>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-community-cipher">加密算法</label>
                        <select id="edge-community-cipher">
                            <option value="AES">AES</option>
                            <option value="Twofish">Twofish</option>
                            <option value="ChaCha20">ChaCha20</option>
                            <option value="Speck">Speck</option>
                            <option value="null">不加密</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="edge-community-compression">压缩算法</label>
                        <select id="edge-community-compression">
                            <option value="none">无</option>
                            <option value="lzo">LZO</option>
                            <option value="zstd">ZSTD</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="required">Supernode 地址列表</label>
                    <div id="edge-supernode-list" class="supernode-list">
                        <div class="supernode-item">
                            <input type="text" placeholder="supernode.example.com:7654" data-required="true">
                            <button class="btn btn-small btn-remove" onclick="removeSupernode(this)">删除</button>
                        </div>
                    </div>
                    <button class="btn btn-small" onclick="addSupernode('edge')">添加 Supernode</button>
                </div>
            </div>

            <div class="section">
                <h3>网络接口</h3>
                <div class="form-group">
                    <label for="edge-tuntap-name">网卡名称</label>
                    <input type="text" id="edge-tuntap-name" placeholder="n3n0">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-tuntap-address">IP 地址</label>
                        <input type="text" id="edge-tuntap-address" placeholder="10.0.1.5/24">
                    </div>
                    <div class="form-group">
                        <label for="edge-tuntap-mode">地址模式</label>
                        <select id="edge-tuntap-mode">
                            <option value="auto" selected>自动选择</option>
                            <option value="static">静态指定</option>
                            <option value="dhcp">DHCP分配</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-tuntap-mac">MAC 地址</label>
                        <input type="text" id="edge-tuntap-mac" placeholder="DE:AD:BE:EF:01:02">
                    </div>
                    <div class="form-group">
                        <label for="edge-tuntap-mtu">MTU</label>
                        <input type="number" id="edge-tuntap-mtu" placeholder="1290">
                    </div>
                </div>
                <div class="form-group">
                    <label for="edge-tuntap-metric">接口度量值 (Windows)</label>
                    <input type="number" id="edge-tuntap-metric" placeholder="0">
                </div>
            </div>

            <div class="section">
                <h3>连接设置</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-connection-bind">绑定地址</label>
                        <input type="text" id="edge-connection-bind" placeholder="0.0.0.0:5000">
                    </div>
                    <div class="form-group">
                        <label for="edge-advertise-addr">广播地址</label>
                        <input type="text" id="edge-advertise-addr" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label for="edge-connection-interval">注册间隔</label>
                        <input type="number" id="edge-connection-interval" placeholder="20">
                    </div>
                    <div class="form-group">
                        <label for="edge-register-ttl">注册包TTL</label>
                        <input type="number" id="edge-register-ttl" placeholder="0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-tos">服务类型 (TOS)</label>
                        <input type="number" id="edge-tos" placeholder="0">
                    </div>

                    <div class="form-group">
                        <label for="edge-auth-username">设备描述/认证用户名</label>
                        <input type="text" id="edge-auth-username" placeholder="username">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="edge-connection-p2p" checked>
                    <label for="edge-connection-p2p">允许 P2P 连接</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-connect-tcp">
                    <label for="edge-connect-tcp">使用 TCP 连接</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-pmtu-discovery">
                    <label for="edge-pmtu-discovery">启用PMTU发现</label>
                </div>
                <br>
                <div class="form-group">
                    <label for="edge-supernode-selection">Supernode 选择策略</label>
                    <select id="edge-supernode-selection">
                        <option value="load">负载均衡 (默认)</option>
                        <option value="rtt">延迟优先</option>
                        <option value="mac">MAC 地址优先</option>
                    </select>
                </div>
            </div>

            <div class="section">
                <h3>认证设置</h3>
                <div class="form-group">
                    <label for="edge-auth-password">密码</label>
                    <input type="password" id="edge-auth-password" placeholder="password">
                </div>
                <div class="form-group">
                    <label for="edge-auth-pubkey">公钥</label>
                    <textarea id="edge-auth-pubkey" placeholder="Base64 编码的公钥"></textarea>
                </div>
            </div>

            <div class="section">
                <h3>管理接口</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-mgmt-port">管理端口</label>
                        <input type="number" id="edge-mgmt-port" placeholder="5644">
                    </div>
                    <div class="form-group">
                        <label for="edge-mgmt-password">管理密码</label>
                        <input type="text" id="edge-mgmt-password" placeholder="n3n">
                    </div>
                </div>
                <div class="form-group">
                    <label for="edge-unix-sock-perms">Unix Socket 权限</label>
                    <input type="number" id="edge-unix-sock-perms" placeholder="660">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-enable-debug-pages">
                    <label for="edge-enable-debug-pages">启用调试页面</label>
                </div>
            </div>

            <div class="section">
                <h3>守护进程</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="edge-daemon-user">运行用户</label>
                        <input type="text" id="edge-daemon-user" placeholder="nobody">
                    </div>
                    <div class="form-group">
                        <label for="edge-daemon-group">运行组</label>
                        <input type="text" id="edge-daemon-group" placeholder="nogroup">
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-daemon-background">
                    <label for="edge-daemon-background">后台运行</label>
                </div>
            </div>

            <div class="section">
                <h3>过滤设置</h3>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-filter-multicast">
                    <label for="edge-filter-multicast">允许多播</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="edge-filter-routing">
                    <label for="edge-filter-routing">允许路由</label>
                </div>
                <br>
                <div class="form-group">
                    <label for="edge-filter-rules">过滤规则</label>
                    <textarea id="edge-filter-rules"
                        placeholder="src_ip/len:[b_port,e_port],dst_ip/len:[s_port,e_port],TCP+/-,UDP+/-,ICMP+/-"></textarea>
                </div>
            </div>

            <div class="section">
                <h3>日志设置</h3>
                <div class="form-group">
                    <label for="edge-logging-verbose">日志级别</label>
                    <select id="edge-logging-verbose">
                        <option value="0">错误</option>
                        <option value="1">警告</option>
                        <option value="2" selected>信息</option>
                        <option value="3">调试</option>
                        <option value="4">详细</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Supernode Configuration -->
        <div id="supernode-tab" class="tab-content">
            <div class="section">
                <h3>Supernode 设置</h3>
                <div class="form-group">
                    <label for="sn-mac">MAC 地址</label>
                    <input type="text" id="sn-mac" placeholder="00:00:00:00:00:00">
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="sn-spoofing" checked>
                    <label for="sn-spoofing">启用欺骗保护</label>
                </div>
                <br>
                <div class="form-group">
                    <label for="sn-version">版本字符串</label>
                    <input type="text" id="sn-version" placeholder="自定义版本信息">
                </div>
            </div>

            <div class="section">
                <h3>连接设置</h3>
                <div class="form-group">
                    <label for="sn-bind" class="required">绑定地址</label>
                    <input type="text" id="sn-bind" value="0.0.0.0:7654" placeholder="0.0.0.0:7654"
                        data-required="true">
                </div>
                <div class="form-group">
                    <label for="sn-advertise-addr">广播地址</label>
                    <input type="text" id="sn-advertise-addr" placeholder="192.168.1.100">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sn-tos">服务类型 (TOS)</label>
                        <input type="number" id="sn-tos" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="sn-register-ttl">注册包TTL</label>
                        <input type="number" id="sn-register-ttl" placeholder="0">
                    </div>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="sn-pmtu-discovery">
                    <label for="sn-pmtu-discovery">启用PMTU发现</label>
                </div>
            </div>

            <div class="section">
                <h3>联邦设置</h3>
                <div class="form-group">
                    <label for="sn-federation" class="required">联邦名称</label>
                    <input type="text" id="sn-federation" value="Federation" placeholder="federation-name"
                        data-required="true">
                </div>
                <div class="form-group">
                    <label>对等节点列表</label>
                    <div id="sn-peer-list" class="supernode-list">
                        <div class="supernode-item">
                            <input type="text" placeholder="peer1.example.com:7654">
                            <button class="btn btn-small btn-remove" onclick="removePeer(this)">删除</button>
                        </div>
                    </div>
                    <button class="btn btn-small" onclick="addPeer()">添加 Peer</button>
                </div>
            </div>

            <div class="section">
                <h3>自动 IP 分配</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="sn-auto-ip-min">最小 IP 范围</label>
                        <input type="text" id="sn-auto-ip-min" placeholder="192.168.100.0/24">
                    </div>
                    <div class="form-group">
                        <label for="sn-auto-ip-max">最大 IP 范围</label>
                        <input type="text" id="sn-auto-ip-max" placeholder="192.168.200.0/24">
                    </div>

            </div>

            <div class="section">
                <h3>社区文件</h3>
                <div class="form-group">
                    <label for="sn-community-file">社区列表文件路径</label>
                    <input type="text" id="sn-community-file" placeholder="/etc/n3n/community.list">

                <h3>管理接口</h3>

            <div class="section">
                <h3>守护进程</h3>

                    <div class="form-group">
                        <label for="sn-groupid">运行组ID</label>
                        <input type="text" id="sn-groupid" placeholder="nogroup">
                    </div>

                    <input type="checkbox" id="sn-background">

                <div class="checkbox-group">
                    <input type="checkbox" id="sn-allow-multicast">

                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="sn-allow-routing">
                    <label for="sn-allow-routing">允许路由</label>
                </div>
                <br>
                <div class="form-group">
                    <label for="sn-filter-rules">过滤规则</label>
                    <textarea id="sn-filter-rules"
                        placeholder="src_ip/len:[b_port,e_port],dst_ip/len:[s_port,e_port],TCP+/-,UDP+/-,ICMP+/-"></textarea>

            <div class="section">
                <h3>日志设置</h3>
                <div class="form-group">
                    <label for="sn-logging-verbose">日志级别</label>

                        <option value="0">错误</option>

                        <option value="2" selected>信息</option>
                        <option value="3">调试</option>

    <script>
        let currentTab = 'edge';

        function switchTab(tab) {
            currentTab = tab;

            // Hide all tabs  
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });

            // Show selected tab  
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        function addSupernode(type) {
            const list = document.getElementById(type + '-supernode-list');
            const item = document.createElement('div');
            item.className = 'supernode-item';
            item.innerHTML = `  
                <input type="text" placeholder="supernode.example.com:7654" data-required="true">  
                <button class="btn btn-small btn-remove" onclick="removeSupernode(this)">删除</button>  
            `;
            list.appendChild(item);
        }

        function removeSupernode(button) {
            button.parentElement.remove();
        }

        function addPeer() {
            const list = document.getElementById('sn-peer-list');
            const item = document.createElement('div');
            item.className = 'supernode-item';
            item.innerHTML = `  
                <input type="text" placeholder="peer.example.com:7654">  
                <button class="btn btn-small btn-remove" onclick="removePeer(this)">删除</button>  
            `;
            list.appendChild(item);
        }

        function removePeer(button) {
            button.parentElement.remove();
        }

        function validateRequiredFields() {
            let isValid = true;
            // 只获取当前活跃TAB内的必填字段  
            const activeTab = document.querySelector('.tab-content.active');
            const requiredFields = activeTab.querySelectorAll('[data-required="true"]');

            requiredFields.forEach(field => {
                if (!field.value.trim()) {
                    field.classList.add('error');
                    isValid = false;

                    // Flash animation  
                    field.style.animation = 'shake 0.5s';
                    setTimeout(() => {
                        field.style.animation = '';
                    }, 500);
                } else {
                    field.classList.remove('error');
                }
            });

            // Check supernode list for edge  
            if (currentTab === 'edge') {
                const supernodeInputs = document.querySelectorAll('#edge-supernode-list input');
                let hasValidSupernode = false;
                supernodeInputs.forEach(input => {
                    if (input.value.trim()) {
                        hasValidSupernode = true;
                    }
                });

                if (!hasValidSupernode) {
                    supernodeInputs.forEach(input => {
                        input.classList.add('error');
                        input.style.animation = 'shake 0.5s';
                        setTimeout(() => {
                            input.style.animation = '';
                        }, 500);
                    });
                    isValid = false;
                }
            }

            return isValid;
        }

        function updateButtonStates() {
            const output = document.getElementById('config-output');
            const hasContent = output.value.trim().length > 0;

            document.getElementById('copy-btn').disabled = !hasContent;
            document.getElementById('download-btn').disabled = !hasContent;
        }

        function downloadConfig() {
            const output = document.getElementById('config-output');

            if (!output.value.trim()) {
                showTooltip('请先生成配置文件', 'error');
                return;
            }

            // 创建下载链接  
            const blob = new Blob([output.value], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');

            // 设置文件名  
            const filename = currentTab === 'edge' ? 'edge.conf' : 'supernode.conf';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            // 清理URL对象  
            window.URL.revokeObjectURL(url);

            showTooltip('配置文件已下载', 'success');
        }

        function generateConfig() {
            if (!validateRequiredFields()) {
                showTooltip('请填写所有红色标识的必填项', 'error');
                return;
            }

            let config = '';

            if (currentTab === 'edge') {
                config = generateEdgeConfig();
            } else {
                config = generateSupernodeConfig();
            }

            document.getElementById('config-output').value = config;
            updateButtonStates(); // 更新按钮状态 
            showTooltip('配置文件已生成', 'success');

            // Auto-scroll to output section  
            document.getElementById('output-section').scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }

        function generateEdgeConfig() {
            let config = '# n3n Edge 配置文件\n';
            config += '# 生成时间: ' + new Date().toLocaleString() + '\n\n';

            // 收集所有section的配置内容  
            let communityContent = '';
            let tuntapContent = '';
            let connectionContent = '';
            let authContent = '';
            let managementContent = '';
            let daemonContent = '';
            let filterContent = '';
            let loggingContent = '';

            // Community section  
            const communityName = document.getElementById('edge-community-name').value;
            if (communityName) communityContent += `# 社区名称，同一社区的节点才能加入同一局域网\nname=${communityName}\n`;

            const communityKey = document.getElementById('edge-community-key').value;
            const cipher = document.getElementById('edge-community-cipher').value;

            // 处理 加密密钥key  
            if (communityKey) {
                communityContent += `# 加密密钥，同一社区必须使用相同密钥\nkey=${communityKey}\n`;
            }

            // 处理 加密算法cipher  
            if (cipher && cipher !== 'AES') {
                // 只有非AES且非空时才输出  
                communityContent += `# 加密算法 (null为不加密，明文传输，但是配置了key的话程序会自动切换到AES)\ncipher=${cipher}\n`;
            }

            const headerEncryption = document.getElementById('edge-header-encryption').checked;
            if (headerEncryption) communityContent += `# 启用头部加密，防止社区名称泄露\nheader_encryption=${headerEncryption}\n`;

            const compression = document.getElementById('edge-community-compression').value;
            if (compression !== 'none') communityContent += `# 数据压缩算法\ncompression=${compression}\n`;

            const supernodeInputs = document.querySelectorAll('#edge-supernode-list input');
            supernodeInputs.forEach(input => {
                const value = input.value.trim();
                if (value) communityContent += `# Supernode地址:端口 (可指定多个实现负载均衡)\nsupernode=${value}\n`;
            });

            if (communityContent) {
                config += '# 社区设置 - 定义网络身份和加密参数\n[community]\n' + communityContent + '\n';
            }

            // Tuntap section  
            const deviceName = document.getElementById('edge-tuntap-name').value;
            if (deviceName) tuntapContent += `# TAP设备名称\nname=${deviceName}\n`;

            const addressMode = document.getElementById('edge-tuntap-mode').value;
            const address = document.getElementById('edge-tuntap-address').value;
            if (addressMode === 'static' && address) {
                tuntapContent += `# IP地址和子网掩码\naddress=${address}\n`;
            }
            if (addressMode !== 'auto') tuntapContent += `# IP地址分配模式\naddress_mode=${addressMode}\n`;

            const mac = document.getElementById('edge-tuntap-mac').value;
            if (mac) tuntapContent += `# MAC地址\nmacaddr=${mac}\n`;

            const mtu = document.getElementById('edge-tuntap-mtu').value;
            if (mtu) tuntapContent += `# 最大传输单元MTU\nmtu=${mtu}\n`;

            const metric = document.getElementById('edge-tuntap-metric').value;
            if (metric) tuntapContent += `# 接口度量值 (Windows专用，影响游戏检测)\nmetric=${metric}\n`;

            if (tuntapContent) {
                config += '# 虚拟网络接口设置\n[tuntap]\n' + tuntapContent + '\n';
            }

            // Connection section  
            const bind = document.getElementById('edge-connection-bind').value;
            if (bind) connectionContent += `# 本地绑定地址:端口\nbind=${bind}\n`;

            const advertiseAddr = document.getElementById('edge-advertise-addr').value;
            if (advertiseAddr) connectionContent += `# 向其他节点广播的地址\nadvertise_addr=${advertiseAddr}\n`;

            const username = document.getElementById('edge-auth-username').value;
            if (username) connectionContent += `# 设备描述\ndescription=${username}\n`;

            const interval = document.getElementById('edge-connection-interval').value;
            if (interval && interval !== '20') connectionContent += `# 向supernode注册间隔(秒)\nregister_interval=${interval}\n`;

            const registerTtl = document.getElementById('edge-register-ttl').value;
            if (registerTtl) connectionContent += `# 注册包TTL值 (NAT穿透)\nregister_pkt_ttl=${registerTtl}\n`;

            const tos = document.getElementById('edge-tos').value;
            if (tos) connectionContent += `# 服务类型 (QoS优先级)\ntos=${tos}\n`;

            const p2p = document.getElementById('edge-connection-p2p').checked;
            if (!p2p) connectionContent += `# 是否允许P2P直连\nallow_p2p=${p2p}\n`; // 默认是true，只有禁用时才输出  

            const connectTcp = document.getElementById('edge-connect-tcp').checked;
            if (connectTcp) connectionContent += `# 使用TCP连接到Supernode\nconnect_tcp=${connectTcp}\n`;

            const pmtuDiscovery = document.getElementById('edge-pmtu-discovery').checked;
            if (pmtuDiscovery) connectionContent += `# 启用路径MTU发现\npmtu_discovery=${pmtuDiscovery}\n`;

            const snSelection = document.getElementById('edge-supernode-selection').value;
            if (snSelection !== 'load') connectionContent += `# Supernode选择策略\nsupernode_selection=${snSelection}\n`;

            if (connectionContent) {
                config += '# 网络连接和传输设置\n[connection]\n' + connectionContent + '\n';
            }

            // Auth section  
            const password = document.getElementById('edge-auth-password').value;
            const pubkey = document.getElementById('edge-auth-pubkey').value;

            if (password) authContent += `# 认证密码\npassword=${password}\n`;
            if (pubkey) authContent += `# 公钥认证\npubkey=${pubkey}\n`;

            if (authContent) {
                config += '# 用户认证设置\n[auth]\n' + authContent + '\n';
            }

            // Management section  
            const mgmtPort = document.getElementById('edge-mgmt-port').value;
            const mgmtPassword = document.getElementById('edge-mgmt-password').value;
            const unixSockPerms = document.getElementById('edge-unix-sock-perms').value;
            const debugPages = document.getElementById('edge-enable-debug-pages').checked;

            if (mgmtPort && mgmtPort !== '5644') managementContent += `# 管理端口\nport=${mgmtPort}\n`;
            if (mgmtPassword && mgmtPassword !== 'n3n') managementContent += `# 管理密码\npassword=${mgmtPassword}\n`;
            if (unixSockPerms) managementContent += `# Unix Socket权限\nunix_sock_perms=${unixSockPerms}\n`;
            if (debugPages) managementContent += `# 启用调试页面\nenable_debug_pages=${debugPages}\n`;

            if (managementContent) {
                config += '# 管理接口设置\n[management]\n' + managementContent + '\n';
            }

            // Daemon section  
            const userid = document.getElementById('edge-daemon-user').value;
            const groupid = document.getElementById('edge-daemon-group').value;
            const background = document.getElementById('edge-daemon-background').checked;

            if (userid) daemonContent += `# 运行用户ID\nuserid=${userid}\n`;
            if (groupid) daemonContent += `# 运行组ID\ngroupid=${groupid}\n`;
            if (background) daemonContent += `# 后台运行\nbackground=${background}\n`;

            if (daemonContent) {
                config += '# 守护进程设置\n[daemon]\n' + daemonContent + '\n';
            }

            // Filter section  
            const allowMulticast = document.getElementById('edge-filter-multicast').checked;
            const allowRouting = document.getElementById('edge-filter-routing').checked;
            const filterRules = document.getElementById('edge-filter-rules').value;

            if (allowMulticast) filterContent += `# 允许多播流量\nallow_multicast=${allowMulticast}\n`;
            if (allowRouting) filterContent += `# 允许IP路由转发\nallow_routing=${allowRouting}\n`;
            if (filterRules) {
                filterContent += '# 过滤规则列表\n';
                filterRules.split('\n').forEach(rule => {
                    rule = rule.trim();
                    if (rule) filterContent += `# 流量过滤规则\nrule=${rule}\n`;
                });
            }

            if (filterContent) {
                config += '# 流量过滤设置\n[filter]\n' + filterContent + '\n';
            }

            // Logging section  
            const verbose = document.getElementById('edge-logging-verbose').value;
            if (verbose !== '2') {
                loggingContent += `# 日志级别(0=错误, 1=警告, 2=信息, 3=调试, 4=详细)\nverbose=${verbose}\n`;
            }

            if (loggingContent) {
                config += '# 日志设置\n[logging]\n' + loggingContent + '\n';
            }

            return config;
        }

        function generateSupernodeConfig() {
            let config = '# n3n Supernode 配置文件\n';
            config += '# 生成时间: ' + new Date().toLocaleString() + '\n\n';

            let supernodeContent = '';
            let connectionContent = '';
            let managementContent = '';
            let daemonContent = '';
            let filterContent = '';
            let loggingContent = '';

            // Supernode section  
            const mac = document.getElementById('sn-mac').value;
            if (mac) supernodeContent += `# Supernode标识MAC地址\nmacaddr=${mac}\n`;

            const spoofing = document.getElementById('sn-spoofing').checked;
            if (!spoofing) supernodeContent += `# MAC/IP地址欺骗保护\nspoofing_protection=${spoofing}\n`; // 默认true，只有禁用时输出  

            const federation = document.getElementById('sn-federation').value;
            if (federation && federation !== 'Federation') supernodeContent += `# 联邦名称\nfederation=${federation}\n`; // 默认"Federation"  

            const peerInputs = document.querySelectorAll('#sn-peer-list input');
            peerInputs.forEach(input => {
                const value = input.value.trim();
                if (value) supernodeContent += `# 对等supernode地址:端口\npeer=${value}\n`;
            });

            const autoIpMin = document.getElementById('sn-auto-ip-min').value;
            if (autoIpMin) supernodeContent += `# 自动IP分配范围起始\nauto_ip_min=${autoIpMin}\n`;

            const autoIpMax = document.getElementById('sn-auto-ip-max').value;
            if (autoIpMax) supernodeContent += `# 自动IP分配范围结束\nauto_ip_max=${autoIpMax}\n`;

            const communityFile = document.getElementById('sn-community-file').value;
            if (communityFile) supernodeContent += `# 社区列表文件路径\ncommunity_file=${communityFile}\n`;

            const version = document.getElementById('sn-version').value;
            if (version) supernodeContent += `# 版本字符串\nversion=${version}\n`;

            if (supernodeContent) {
                config += '# Supernode服务器设置\n[supernode]\n' + supernodeContent + '\n';
            }

            // Connection section  
            const bind = document.getElementById('sn-bind').value;
            // 检查是否为默认值 (0.0.0.0:7654 或 ::7654 或 7654)  
            if (bind && bind !== '0.0.0.0:7654' && bind !== '::7654' && bind !== '7654') {
                connectionContent += `# 监听地址:端口 (主服务端口)\nbind=${bind}\n`;
            }

            const advertiseAddr = document.getElementById('sn-advertise-addr').value;
            if (advertiseAddr) connectionContent += `# 广播地址\nadvertise_addr=${advertiseAddr}\n`;

            const tos = document.getElementById('sn-tos').value;
            if (tos) connectionContent += `# 服务类型\ntos=${tos}\n`;

            const registerTtl = document.getElementById('sn-register-ttl').value;
            if (registerTtl) connectionContent += `# 注册包TTL\nregister_pkt_ttl=${registerTtl}\n`;

            const pmtuDiscovery = document.getElementById('sn-pmtu-discovery').checked;
            if (pmtuDiscovery) connectionContent += `# 启用PMTU发现\npmtu_discovery=${pmtuDiscovery}\n`;

            if (connectionContent) {
                config += '# 网络连接设置\n[connection]\n' + connectionContent + '\n';
            }

            // Management section  
            const mgmtPort = document.getElementById('sn-mgmt-port').value;
            const mgmtPassword = document.getElementById('sn-mgmt-password').value;

            if (mgmtPort && mgmtPort !== '5645') managementContent += `# 管理端口\nport=${mgmtPort}\n`;
            if (mgmtPassword && mgmtPassword !== 'n3n') managementContent += `# 管理密码\npassword=${mgmtPassword}\n`;

            if (managementContent) {
                config += '# 管理接口设置\n[management]\n' + managementContent + '\n';
            }

            // Daemon section  
            const userid = document.getElementById('sn-userid').value;
            const groupid = document.getElementById('sn-groupid').value;
            const background = document.getElementById('sn-background').checked;

            if (userid) daemonContent += `# 运行用户ID\nuserid=${userid}\n`;
            if (groupid) daemonContent += `# 运行组ID\ngroupid=${groupid}\n`;
            if (background) daemonContent += `# 后台运行\nbackground=${background}\n`;

            if (daemonContent) {
                config += '# 守护进程设置\n[daemon]\n' + daemonContent + '\n';
            }

            // Filter section  
            const allowMulticast = document.getElementById('sn-allow-multicast').checked;
            const allowRouting = document.getElementById('sn-allow-routing').checked;
            const filterRules = document.getElementById('sn-filter-rules').value;

            if (allowMulticast) filterContent += `# 允许多播流量\nallow_multicast=${allowMulticast}\n`;
            if (allowRouting) filterContent += `# 允许路由转发\nallow_routing=${allowRouting}\n`;
            if (filterRules) {
                filterContent += '# 过滤规则列表\n';
                filterRules.split('\n').forEach(rule => {
                    rule = rule.trim();
                    if (rule) filterContent += `# 流量过滤规则\nrule=${rule}\n`;
                });
            }

            if (filterContent) {
                config += '# 流量过滤设置\n[filter]\n' + filterContent + '\n';
            }

            // Logging section  
            const verbose = document.getElementById('sn-logging-verbose').value;
            if (verbose !== '2') {
                loggingContent += `# 日志级别 (0=错误, 1=警告, 2=信息, 3=调试, 4=详细)\nverbose=${verbose}\n`;
            }

            if (loggingContent) {
                config += '# 日志设置\n[logging]\n' + loggingContent + '\n';
            }

            return config;
        }

        function copyConfig() {
            const output = document.getElementById('config-output');

            if (!output.value) {
                showTooltip('请先生成配置文件', 'error');
                return;
            }

            // Modern copy method with fallback for older devices  
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(output.value).then(() => {
                    showTooltip('配置已复制到剪贴板', 'success');
                }).catch(() => {
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }
        }

        function fallbackCopy() {
            const output = document.getElementById('config-output');
            output.select();
            output.setSelectionRange(0, 99999); // For mobile devices  

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showTooltip('配置已复制到剪贴板', 'success');
                } else {
                    showTooltip('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                showTooltip('复制失败，请手动复制', 'error');
            }
        }

        function showTooltip(message, type) {
            const tooltip = document.createElement('div');
            tooltip.className = `copy-feedback ${type}`;
            tooltip.textContent = message;
            document.body.appendChild(tooltip);

            setTimeout(() => {
                tooltip.style.opacity = '0';
                setTimeout(() => {
                    if (document.body.contains(tooltip)) {
                        document.body.removeChild(tooltip);
                    }
                }, 300);
            }, 2000);
        }

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        }

        function checkBackToTopButton() {
            const tabs = document.querySelector('.tabs');
            const backToTopBtn = document.getElementById('back-to-top');

            if (!tabs || !backToTopBtn) return;

            const tabsRect = tabs.getBoundingClientRect();
            const isVisible = tabsRect.top >= 0 && tabsRect.bottom <= window.innerHeight;

            if (isVisible) {
                backToTopBtn.classList.remove('visible');
            } else {
                backToTopBtn.classList.add('visible');
            }
        }

        // Add input validation  
        document.addEventListener('DOMContentLoaded', function () {

            // 初始化时检查地址模式  
            const addressMode = document.getElementById('edge-tuntap-mode').value;
            const addressField = document.getElementById('edge-tuntap-address');
            const addressGroup = addressField.closest('.form-group');

            if (addressMode === 'dhcp' || addressMode === 'auto') {
                addressGroup.style.display = 'none';
            }

            // 地址模式切换监听  
            document.getElementById('edge-tuntap-mode').addEventListener('change', function (e) {
                const addressField = document.getElementById('edge-tuntap-address');
                const addressGroup = addressField.closest('.form-group');

                if (e.target.value === 'dhcp' || e.target.value === 'auto') {
                    addressGroup.style.display = 'none';
                } else {
                    addressGroup.style.display = 'block';
                }
            });

            // MAC地址验证 - 统一处理客户端和服务端  
            const macInputs = document.querySelectorAll('input[placeholder*="MAC"], input[placeholder*="DE:AD"], input[placeholder*="00:00"]');
            macInputs.forEach(input => {
                input.addEventListener('input', function (e) {
                    let value = e.target.value.replace(/[^0-9A-Fa-f:]/g, '');
                    if (value.length > 17) value = value.substring(0, 17);
                    e.target.value = value.toUpperCase();
                });
            });

            // IP地址验证  
            const ipInputs = document.querySelectorAll('input[placeholder*="10.0"], input[placeholder*="192.168"]');
            ipInputs.forEach(input => {
                input.addEventListener('input', function (e) {
                    let value = e.target.value;
                    value = value.replace(/[^0-9.\/]/g, '');
                    e.target.value = value;
                });
            });

            // 端口号验证 - 只对纯数字输入框应用  
            const portInputs = document.querySelectorAll('input[type="number"]');
            portInputs.forEach(input => {
                input.addEventListener('input', function (e) {
                    let value = e.target.value.replace(/[^0-9]/g, '');
                    if (value && parseInt(value) > 65535) {
                        value = '65535';
                    }
                    e.target.value = value;
                });
            });

            // 主机名地址验证 - supernode和peer地址  
            const hostnameInputs = document.querySelectorAll('#edge-supernode-list input, #sn-peer-list input, input[placeholder*="supernode"], input[placeholder*="peer"], input[placeholder*="bind"], input[placeholder*="advertise"]');
            hostnameInputs.forEach(input => {
                input.addEventListener('input', function (e) {
                    // 允许字母、数字、点、冒号和连字符  
                    let value = e.target.value.replace(/[^a-zA-Z0-9.:.-]/g, '');
                    e.target.value = value;
                });
            });

            //  移除错误状态
            document.querySelectorAll('input, select, textarea').forEach(field => {
                field.addEventListener('input', function () {
                    this.classList.remove('error');
                });
            });

            // 监听输出框内容变化  
            const outputTextarea = document.getElementById('config-output');
            outputTextarea.addEventListener('input', updateButtonStates);

            // 初始化按钮状态  
            updateButtonStates();

            // 添加滚动监听  
            window.addEventListener('scroll', checkBackToTopButton);
            window.addEventListener('resize', checkBackToTopButton);

            // 初始检查  
            checkBackToTopButton();
        });  
    </script>
</body>

</html>
