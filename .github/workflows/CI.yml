     - name: 🗃 缓存 openssl 库
       if: ${{ inputs.enable_openssl && !endsWith(matrix.target, 'bsd') }}
       id: cache-openssl
       uses: actions/cache@v5
       with:
        path: |
          thirdparty/openssl-${{ matrix.URL }}
        key: openssl-${{ matrix.URL }}-cache
     - name: ⛏ 编译 openssl 库
       if: ${{ inputs.enable_openssl && steps.cache-openssl.outputs.cache-hit != 'true' && !endsWith(matrix.target, 'bsd') }}
       env:
         TARGET: ${{ matrix.target }}
         URL: ${{ matrix.URL }}
       shell: bash
       run: |
         if [ ! -d "${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}" ] || [ -z "$(find ${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib -name '*.a' 2>/dev/null)" ] ; then
            curl -Lk -o openssl-3.6.1.tar.gz https://www.openssl.org/source/openssl-3.6.1.tar.gz || wget https://www.openssl.org/source/openssl-3.6.1.tar.gz
            tar xf openssl-3.6.1.tar.gz --exclude='*/tests/*'
            echo "######################编译openssl依赖库########################"
            cd openssl-3.6.1
            ./Configure ${{ matrix.OPENSSL_TARGET }} \
              no-shared no-zlib no-tests --prefix=${GITHUB_WORKSPACE}/thirdparty/openssl-${URL} \
              LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              
            make -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
            make install_sw
         fi

     - name: 🗃 缓存 pcap 库
       if: ${{ inputs.enable_pcap && (runner.os == 'Linux' || runner.os == 'macOS') && !contains(matrix.target, 'windows') && !endsWith(matrix.target, 'bsd') }}
       id: cache-pcap
       uses: actions/cache@v5
       with:
        path: |
          thirdparty/pcap-${{ matrix.URL }}
        key: pcap-${{ matrix.URL }}-cache
     - name: ⛏ 编译 pcap 库
       if: ${{ inputs.enable_pcap && (runner.os == 'Linux' || runner.os == 'macOS') && steps.cache-pcap.outputs.cache-hit != 'true' && !contains(matrix.target, 'windows') && !endsWith(matrix.target, 'bsd') }}
       env:
         TARGET: ${{ matrix.target }}
         URL: ${{ matrix.URL }}
       run: |
         if [ ! -d "${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}" ] || [ -z "$(find ${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}/lib -name '*.a' 2>/dev/null)" ] ; then
            wget https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz
            tar xf libpcap-1.10.6.tar.gz
            echo "######################编译miniupnp依赖库########################"
            cd libpcap-1.10.6
            ./configure --host=${TARGET} --prefix=${GITHUB_WORKSPACE}/thirdparty/pcap-${URL} --disable-shared --enable-static
              
            make -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
            make install
         fi

     - name: 🗃 缓存 libcap 库
       if: ${{ inputs.enable_libcap && runner.os == 'Linux' && !contains(matrix.target, 'windows') && !endsWith(matrix.target, 'bsd') }}
       id: cache-libcap
       uses: actions/cache@v5
       with:
        path: |
          thirdparty/libcap-${{ matrix.URL }}
        key: libcap-${{ matrix.URL }}-cache
     - name: ⛏ 编译 libcap 库
       if: ${{ inputs.enable_libcap && runner.os == 'Linux' && steps.cache-libcap.outputs.cache-hit != 'true' && !contains(matrix.target, 'windows') && !endsWith(matrix.target, 'bsd') }}
       env:
         TARGET: ${{ matrix.target }}
         URL: ${{ matrix.URL }}
       run: |
         if [ ! -d "${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}" ] || [ -z "$(find ${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/lib -name '*.a' 2>/dev/null)" ] ; then
            wget https://www.kernel.org/pub/linux/libs/security/linux-privs/libcap2/libcap-2.77.tar.gz
            tar xf libcap-2.77.tar.gz
            echo "######################编译libcap依赖库########################"
            cd libcap-2.77/libcap
            #make _makenames      # 用 host gcc 编译生成可执行文件
            #./_makenames > cap_names.h
            #gcc empty.c -o empty
            #objcopy --dump-section .interp=loader.txt empty /dev/null
            #make BUILD_CC=gcc CC=${CC} AR=${AR} RANLIB=${RANLIB} PREFIX=${GITHUB_WORKSPACE}/thirdparty/libcap-${URL} SHARED=no lib=lib -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
            #make install prefix=${GITHUB_WORKSPACE}/thirdparty/libcap-${URL} lib=lib
            make BUILD_CC=gcc \
             CC=${CC} \
             AR=${AR} \
             RANLIB=${RANLIB} \
             SHARED=no \
              libcap.a

            mkdir -p ${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/lib
            mkdir -p ${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/include/sys

            cp libcap.a ${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/lib/
            cp ../libcap/include/sys/capability.h ${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/include/sys/
         fi
         
     - name: ⛏ 编译Linux Mac Windows N3N
       if: "!endsWith(matrix.target, 'bsd')"
       env:
         TARGET: ${{ matrix.target }}
         URL: ${{ matrix.URL }}
       shell: bash
       run: |
         # 构建配置参数  
         CONFIGURE_FLAGS=""
         MAKE_FLAGS=""
         if [[ "$RUNNER_OS" == "Linux" && "${{ matrix.target }}" =~ windows$ ]]; then
            # Windows 交叉编译需要的系统库
            export LDFLAGS="$LDFLAGS -lws2_32 -liphlpapi -lnetapi32"
            export LIBS="$LIBS -lws2_32 -liphlpapi -lnetapi32"
         fi
      
         # 根据输入添加参数  
         if [ "${{ github.event.inputs.enable_zstd }}" = "true" ]; then  
           CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-zstd"
           if echo "$URL" | grep -q mingw; then
              export LDLIBS_EXTRA="$LDLIBS_EXTRA -lzstd"
           fi
         fi  
      
         if [ "${{ github.event.inputs.enable_openssl }}" = "true" ]; then  
           CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-openssl"
           OPENSSL_DIR=${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}
           if echo "$URL" | grep -q mingw; then
              export LIBS="$LIBS -lssl -lcrypto -lcrypt32 -lbcrypt"
              export LDLIBS_EXTRA="$LDLIBS_EXTRA -lssl -lcrypto -lcrypt32 -lbcrypt"
           fi
         fi 
         
         # 因src/n2n_port_mapping.c缺少头文件定义 stdint.h stddef.h n2n.h n2n_define.h 这里手动补上
         if [[ "$RUNNER_OS" == "macOS" ]]; then
            # macOS 
            tmpfile=$(mktemp)
            printf '#include <stddef.h>\n#include <n3n/logging.h>\n#include "n2n.h"\n#include "n2n_define.h"\n' > "$tmpfile"
            cat src/n2n_port_mapping.c >> "$tmpfile"
            mv "$tmpfile" src/n2n_port_mapping.c
           else
            # Linux / Windows Git Bash
            sed -i '1i#include <stddef.h>\n#include <n3n/logging.h>\n#include "n2n.h"\n#include "n2n_define.h"\n' src/n2n_port_mapping.c
         fi
         
         if [ "${{ github.event.inputs.enable_miniupnp }}" = "true" ]; then
           echo "###########编译 miniupnpc  依赖库###########"
           MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_MINIUPNPC=1"
           CFLAGS="$CFLAGS -I$(pwd)/thirdparty/miniupnp"
           cp -r "$(pwd)/thirdparty/miniupnp/miniupnpc/include/." "$(pwd)/thirdparty/miniupnp/miniupnpc/"
           if echo "$URL" | grep -q mingw; then
              # 传递win32标志 
              export CFLAGS="$CFLAGS -D_WIN32"
              
              echo "修复 mingw setsockopt 参数类型"
              # 因为在2.3.3版本才修复 mingw setsockopt time错误 https://github.com/miniupnp/miniupnp/commit/f1fc7490a6f9d0b3ea5667b7db15385fd3253b60
              FILE="thirdparty/miniupnp/miniupnpc/src/connecthostport.c"
              sed -i 's/&timeout, sizeof(struct timeval)/(const char *)\&timeout, sizeof(timeout)/g' "$FILE"
              
              cmake -S thirdparty/miniupnp/miniupnpc -B build-miniupnpc \
                -DCMAKE_C_COMPILER=${CC} \
                -DUPNPC_BUILD_SHARED=OFF \
                -DUPNPC_BUILD_SAMPLE=OFF \
                -DUPNPC_BUILD_TESTS=OFF \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.18 \
                -DWIN32=ON -DUPNPC_BUILD_STATIC=ON \
                -DCMAKE_INSTALL_PREFIX=$(pwd)/thirdparty/miniupnp/miniupnpc/build
              # 由于libminiupnpc.a没有链接Windows库所以编译N3N的exe时要明确指定添加库链接
              sed -i 's/LDLIBS)/LDLIBS) -lminiupnpc -lws2_32 -liphlpapi -lnetapi32/g' tools/Makefile
              sed -i 's/LDLIBS)/LDLIBS) -lminiupnpc -lws2_32 -liphlpapi -lnetapi32/g' apps/Makefile
           else
             cmake -S thirdparty/miniupnp/miniupnpc -B build-miniupnpc \
                -DCMAKE_C_COMPILER=${CC} \
                -DUPNPC_BUILD_SHARED=OFF \
                -DUPNPC_BUILD_STATIC=ON \
                -DUPNPC_BUILD_SAMPLE=OFF \
                -DUPNPC_BUILD_TESTS=OFF \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.18 \
                -DCMAKE_INSTALL_PREFIX=$(pwd)/thirdparty/miniupnp/miniupnpc/build
           fi

           cmake --build build-miniupnpc -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
           cmake --install build-miniupnpc
           cp thirdparty/miniupnp/miniupnpc/build/lib/liblibminiupnpc.a thirdparty/miniupnp/miniupnpc/build/lib/libminiupnpc.a || true
           # 已经添加这个库 就明确定义已经集成
           export CFLAGS="$CFLAGS -DHAVE_LIBMINIUPNPC=1"
           LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/miniupnp/miniupnpc/build/lib -lminiupnpc"
         fi  
      
         if [ "${{ github.event.inputs.enable_natpmp }}" = "true" ]; then  
           echo "###########编译 libnatpmp  依赖库###########"
           MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_LIBNATPMP=1"
           if echo "$URL" | grep -q mingw; then
              SYSTEM_NAME=Windows
           else
              SYSTEM_NAME=$RUNNER_OS
           fi
           # 配置 CMake
           cmake -S "$(pwd)/thirdparty/libnatpmp" -B "$(pwd)/thirdparty/libnatpmp" \
               -DCMAKE_C_COMPILER=${CC} \
               -DCMAKE_SYSTEM_NAME=$SYSTEM_NAME \
               -DCMAKE_INSTALL_PREFIX="$(pwd)/thirdparty/libnatpmp" \
               -DBUILD_SHARED_LIBS=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.18
           # 只编译库
           cmake --build "$(pwd)/thirdparty/libnatpmp" --target natpmp -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
           # 安装到指定目录
           cmake --install "$(pwd)/thirdparty/libnatpmp"
           ls -la thirdparty/libnatpmp/libnatpmp.a || echo "libnatpmp.a库文件不存在"
           # 更新 LDFLAGS / CFLAGS 以便后续链接使用
           export LDLIBS_EXTRA="$LDLIBS_EXTRA -lnatpmp"
           LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/libnatpmp -lnatpmp"
           CFLAGS="$CFLAGS -I$(pwd)/thirdparty/libnatpmp -DHAVE_LIBNATPMP=1"
         fi  
      
         if [ "${{ github.event.inputs.enable_pcap }}" = "true" ] && [[ "$RUNNER_OS" == "macOS" ]] && [[ ! "${{ matrix.target }}" =~ windows ]]; then  
           CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pcap"
         fi  
      
         if [ "${{ github.event.inputs.enable_libcap }}" = "true" ] && [[ "$RUNNER_OS" == "Linux" ]] && [[ ! "${{ matrix.target }}" =~ windows ]]; then  
           CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-cap"
         fi  
      
         if [ "${{ github.event.inputs.enable_pthread }}" = "true" ]; then  
           CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pthread"
           if echo "$URL" | grep -q mingw; then
              # 使用MinGW的系统pthread 去掉自定义的pthread
              export CFLAGS="$CFLAGS -DHAVE_LIBPTHREAD=1"
              export LDFLAGS="$LDFLAGS -lpthread"
              export LDLIBS_EXTRA="${LDLIBS_EXTRA} -lpthread"
              # 先在 n2n_win32.h 顶部插入系统 pthread 头
              sed -i '1i #ifdef HAVE_LIBPTHREAD\n#include <pthread.h>\n#endif' src/win32/n2n_win32.h
              # 注释掉自定义 pthread 宏
              sed -i '/#define pthread_t/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_mutex_t/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_create/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_cancel/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_mutex_init/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_mutex_lock/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_mutex_trylock/ s/^/\/\//' src/win32/n2n_win32.h
              sed -i '/#define pthread_mutex_unlock/ s/^/\/\//' src/win32/n2n_win32.h
           fi
         fi
         if echo "$URL" | grep -q mingw; then
              # 为Windows修复后缀问题
              export host_os="mingw32"
              export EXE=.exe
              if echo "$URL" | grep -q "aarch64-w64-mingw32"; then
                # arm64的Windows无法修复直接硬编码后缀
                sed -i 's/-o \$@/-o \$@$(EXE)/' tools/Makefile
                sed -i 's/-o \$@/-o \$@$(EXE)/' apps/Makefile
              fi
              version="$(scripts/version.sh)"
              # 为Windows编译tools时添加win特有库和版本无法传递问题
              export LDLIBS_EXTRA="${LDLIBS_EXTRA} -lws2_32 -liphlpapi -lnetapi32"
              export CFLAGS="$CFLAGS -DWIN32 -D_WINDOWS -I${GITHUB_WORKSPACE}/include -DVERSION='\"$version\"'"
         fi

         echo "########### 编译 N3N ###########"
         ./autogen.sh 
         ./configure $CONFIGURE_FLAGS --host="${{ matrix.URL }}" PREFIX=. CC="${CC}" LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
         make -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4) PREFIX=. $MAKE_FLAGS
         ls -la apps/
         make install \
          PREFIX=. $MAKE_FLAGS \
          CONFIG_BINDIR=./bin \
          CONFIG_SBINDIR=./bin \
          ETCDIR=./bin \
          CONFIG_DOCDIR=./bin \
          CONFIG_MANDIR=./bin \
          CONFIG_SYSTEMDDIR=./bin

          # 复制示例配置文件进去
          cp doc/edge.conf.sample ./bin/ 2>/dev/null || true
          cp doc/supernode.conf.sample ./bin/ 2>/dev/null || true
          
          echo "### 编译 tools ####"
          make tools LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_EXTRA="${LDLIBS_EXTRA}" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include" 
           
          echo "### 安装 tools ####"
          make -C tools install CONFIG_SBINDIR=$(pwd)/bin INSTALL=install INSTALL_PROG="install -m 755" LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include"
          ls -la tools/
          
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "Linux 依赖库:"
            ldd ./bin/n3n-edge || ldd ./bin/n3n-edge.exe || true
            file ./bin/n3n-edge|| file ./bin/n3n-edge.exe || true
            # 端口转发工具验证
            ldd ./bin/n3n-portfwd || ldd ./bin/n3n-portfwd.exe || true
            file ./bin/n3n-portfwd || file ./bin/n3n-portfwd.exe || true
            # 端口转发工具验证 
            ./bin/n3n-portfwd || true
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "macOS 依赖库:"
            otool -L ./bin/n3n-edge || true
            # 端口转发工具验证 
            ./bin/n3n-portfwd || true
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Windows 依赖库:"
            if command -v objdump &>/dev/null; then
              objdump -p ./bin/n3n-edge.exe | grep "DLL Name" || true
            else
              echo "需要 objdump 或 dumpbin 工具检查依赖"
            fi
            ./bin/n3n-portfwd.exe || true
          fi
       
     - name: 🔧 安装 UPX
       if: ${{ github.event.inputs.upx == 'true' && runner.os == 'Linux' && !endsWith(matrix.target, 'bsd') }}
       uses: crazy-max/ghaction-upx@v4
       with:
        version: v4.2.4
        install-only: true
        
     - name: 🗜 压缩二进制
       if: ${{ github.event.inputs.upx == 'true' && runner.os == 'Linux' && !endsWith(matrix.target, 'bsd') }}
       run: upx --lzma --best bin/* || true
       
     - name: 📤 上传产物
       uses: actions/upload-artifact@v7
       with:
        name: n3n-${{ github.event.inputs.repo_ref }}-${{ matrix.target }}
        path: bin/*

  summary:
    runs-on: ubuntu-latest
    outputs:
      table: ${{ steps.set_output.outputs.table }}
    steps:
      - name: 📬 检出代码
        uses: actions/checkout@v6
        with:
          repository: 'n42n/n3n'
          ref: "${{ github.event.inputs.repo_ref }}"
          fetch-depth: 0
          submodules: recursive

      - name: 📊 生成 Summary 概览
        if: always()
        shell: bash
        run: |
          echo -e "## 🔔 编译结果总览\n\n" >> summary.md
          echo -e "## 📦 各平台架构的功能模块集成概览\n\n" >> release.md

          # ===== 基础功能开关 =====
          base_flag() {
            [ "$1" = "true" ] && echo "✅" || echo "❌"
          }

          ZSTD=$(base_flag "${{ github.event.inputs.enable_zstd }}")
          OPENSSL=$(base_flag "${{ github.event.inputs.enable_openssl }}")
          UPNP=$(base_flag "${{ github.event.inputs.enable_miniupnp }}")
          NATPMP=$(base_flag "${{ github.event.inputs.enable_natpmp }}")
          PTHREAD=$(base_flag "${{ github.event.inputs.enable_pthread }}")

          # ===== 输出函数 =====
          print_group() {
            TITLE=$1
            shift

            # 折叠开始
            echo "<details>" >> summary.md
            echo -e "<summary><strong>${TITLE}</strong></summary>\n\n" >> summary.md

            echo "<details>" >> release.md
            echo -e "<summary><strong>${TITLE}</strong></summary>\n\n" >> release.md
            
            echo "| 🖥️ 架构名称 | 📦文件名称 | 🗜️ZSTD压缩 | 🔐OpenSSL加密 | 🌐UPnP端口映射 | 📡NAT-PMP端口映射 | 📦PCAP数据包抓包 | 🛡️CAP_Linux权限控制 | 🧵Pthread多线程 |" >> summary.md
            echo "| 🖥️ 架构名称 | 📦文件名称 | 🗜️ZSTD压缩 | 🔐OpenSSL加密 | 🌐UPnP端口映射 | 📡NAT-PMP端口映射 | 📦PCAP数据包抓包 | 🛡️CAP_Linux权限控制 | 🧵Pthread多线程 |" >> release.md
            echo "|--------|--------|--------|--------|--------|--------|--------|--------|--------|" >> summary.md
            echo "|--------|--------|--------|--------|--------|--------|--------|--------|--------|" >> release.md

            for ARCH in "$@"; do

              # ===== 平台判断 =====
              PCAP="❌"
              LIBCAP="❌"

              if [[ "$ARCH" != *windows* ]]; then
                PCAP=$(base_flag "${{ github.event.inputs.enable_pcap }}")
              fi

              if [[ "$ARCH" == *linux* ]]; then
                LIBCAP=$(base_flag "${{ github.event.inputs.enable_libcap }}")
              fi

              NAME="n3n-${{ github.event.inputs.repo_ref }}-${ARCH}"
              # summary：纯文本
              FILE_SUMMARY="📦 ${NAME}"
              # release：带链接
              URL="https://github.com/${{ github.repository }}/releases/download/${{ env.tag }}/${NAME}.tar.gz"
              FILE_RELEASE="[📥 ${NAME}](${URL})"

              echo "| ${ARCH} | ${FILE_SUMMARY} | ${ZSTD} | ${OPENSSL} | ${UPNP} | ${NATPMP} | ${PCAP} | ${LIBCAP} | ${PTHREAD} |" >> summary.md
              echo "| ${ARCH} | ${FILE_RELEASE} | ${ZSTD} | ${OPENSSL} | ${UPNP} | ${NATPMP} | ${PCAP} | ${LIBCAP} | ${PTHREAD} |" >> release.md
            done

            echo "" >> summary.md
            echo "" >> release.md

             # 折叠结束
             echo -e "</details>\n\n" >> summary.md
             echo -e "</details>\n\n" >> release.md
          }

          # ===== 分组输出 =====

          print_group "🐧 Linux 平台" \
            aarch64-linux x86_64-linux i686-linux \
            armv7-linux-eabihf armv7-linux-eabi \
            arm-linux-eabihf arm-linux-eabi \
            mipsel-linux mips-linux mips64-linux \
            s390x-linux loongarch64-linux \
            riscv32-linux riscv64-linux

          print_group "🍎 macOS 平台" \
            x86_64-macos arm64-macos

          print_group "🪟 Windows 平台" \
            x86_64-windows i686-windows arm64-windows

          print_group "🐡 BSD 平台" \
            x86_64-freebsd arm64-freebsd \
            x86_64-openbsd arm64-openbsd \
            x86_64-netbsd arm64-netbsd

          # ===== Git 哈希 =====
          SHORT_HASH=$(git rev-parse --short HEAD)
          FULL_HASH=$(git rev-parse HEAD)
          COMMIT_URL="https://github.com/n42n/n3n/commit/${FULL_HASH}"

          echo -e "----\n\n" >> summary.md
          echo -e "----\n\n" >> release.md
          echo "🔖 当前编译使用的源码哈希为：[${SHORT_HASH}](${COMMIT_URL})" >> summary.md
          echo "🔖 当前编译使用的源码哈希为：[${SHORT_HASH}](${COMMIT_URL})" >> release.md
          echo "⏱ 请等待构建流程完成，然后刷新页面在下方 **Artifacts** 里下载程序包" >> summary.md
          # 写入 GitHub Summary
          cat summary.md >> $GITHUB_STEP_SUMMARY
          
      - name: 📤 设置release描述输出
        id: set_output
        run: |
          echo "table<<EOF" >> $GITHUB_OUTPUT
          cat release.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release:
    needs: [build, summary]
    if: ${{ github.event.inputs.rel != 'none' }}
    runs-on: ubuntu-latest
    steps:
     - name: 📥 下载所有构建产物
       uses: actions/download-artifact@v4
       with:
        path: release

     - name: 📦 打包 bin 文件为 tar.gz
       shell: bash
       run: |
         mkdir -p release_tar
         for dir in release/*; do
           target="${dir##*/}"  # 取目录名 n3n-xxx
           cd "$dir" || continue
           tar -czf "../../release_tar/${target}.tar.gz" *
           cd -
         done

     - name: ⏳ 生成时间与标签
       shell: bash
       run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "build_time=$(date '+%Y年%m月%d日%H:%M:%S' | jq -sRr @uri)" >> $GITHUB_ENV
          if [ -z "${{ env.tag }}" ]; then
              echo "tag=$(date '+%Y-%m-%d')" >> $GITHUB_ENV
          fi

     - name: ✅ 发布 Release
       uses: softprops/action-gh-release@v2
       with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
           > ### ![](https://img.shields.io/badge/%E7%BC%96%E8%AF%91%E6%97%B6%E9%97%B4-${{ env.build_time }}-8267?logo=github&labelColor=%E9%A1%BB)![](https://img.shields.io/github/downloads/${{ github.repository }}/${{ env.tag }}/total?label=%E4%B8%8B%E8%BD%BD%E6%AC%A1%E6%95%B0&logo=github)

           ${{ needs.summary.outputs.table }}
           
          tag_name: ${{ env.tag }}
          files: release_tar/*.tar.gz
          
  del:
    #needs: build
    runs-on: ubuntu-latest
    steps:
      - name: ♻️ 删除流程记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 1
          keep_minimum_runs: 1

 
