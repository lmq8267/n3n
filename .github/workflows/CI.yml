name: 🎯 编译N3N-多平台架构 🎯

on:
  # 手动触发执行
  workflow_dispatch:
    inputs:

      repo_ref:
        description: |
          🌿 编译的 n42n/n3n 仓库分支或版本号
          【示例: main / dev / 3.4.4】
          【默认：主分支 main】
        required: true
        default: "main"

      rel:
        description: |
          📦 编译完成后的 Release 发布方式

          【none：
          不发布 Release，仅编译】

          【release：
          发布正式稳定版 Release】

          【pr：
          发布 PR 测试版 Release】
        required: true
        default: release
        type: choice
        options:
          - none
          - release
          - pr

      tag:
        description: |
          🏷️ 指定 Release 版本号

          【示例:
          v1.0.0 或
          v2.3.1 或
          beta-20240310】

          【留空将自动使用当前 commit 哈希】
        required: false
        default: ""

      upx:
        description: |
          🗜️ 启用 UPX 二进制压缩

          【将编译后的程序进行压缩以减小体积】

          【优点:
          1.程序体积更小
          2.在线下载更快】

          【注意:
          ⚠ 会增加程序运行时的内存占用】
        required: true
        default: true
        type: boolean

      enable_zstd:
        description: |
          🗜️ 启用 ZSTD 压缩支持
          【依赖: libzstd-dev 库】
          【作用: 提供高性能数据压缩，提高传输效率】
          【平台: 🌍 全平台可用】
        required: false
        default: true
        type: boolean

      enable_openssl:
        description: |
          🔐 启用 OpenSSL 加密支持
          【依赖: libssl-dev 库】
          【作用: 提供 TLS/加密算法支持，用于安全通信】
          【平台: 🌍 全平台可用】
        required: false
        default: true
        type: boolean

      enable_miniupnp:
        description: |
          🌐 启用 miniupnp NAT 穿透
          【依赖: libminiupnpc-dev 库】
          【作用: 自动向路由器申请端口映射】
          【平台: 🌍 全平台可用】
        required: false
        default: true
        type: boolean

      enable_natpmp:
        description: |
          📡 启用 NAT-PMP 端口映射
          【依赖: libnatpmp-dev 库】
          【作用: 自动端口映射协议】
          【平台: 🌍 全平台可用】
        required: false
        default: true
        type: boolean

      enable_pcap:
        description: |
          📦 启用 PCAP 抓包接口
          【依赖: libpcap-dev 库】
          【作用: 提供底层网络数据包捕获能力】
          【平台: 🐧 Unix-like (Linux/macOS/BSD) 可用】
        required: false
        default: true
        type: boolean

      enable_libcap:
        description: |
          🛡️ 启用 Linux Capability 权限
          【依赖: libcap-dev 库】
          【作用: 允许程序使用网络权限而不需要 root】
          【平台: 🐧 Linux 可用】
        required: false
        default: false
        type: boolean

      enable_pthread:
        description: |
          🧵 启用 POSIX 线程支持
          【依赖: pthread (系统内置)】
          【作用: 提供多线程并发能力】
          【平台: 🌍 全平台可用】
        required: false
        default: true
        type: boolean
        
# 流程运行时停止之前正在运行的流程 保证同时只运行一个   
concurrency:
  group: n3n-build-${{ github.event.inputs.repo_ref }}
  cancel-in-progress: true
        
# 全局环境变量
env:
  tag: "${{ github.event.inputs.tag }}"
  rel: "${{ github.event.inputs.rel }}"
  TZ: Asia/Shanghai

# 仓库操作权限
permissions:
  contents: write
  actions: write

jobs:
  build:
    name: 🛠 编译 ${{ matrix.target }} 平台架构
    strategy:
      fail-fast: false
      matrix:
        include:
        # Linux
        - target: aarch64-linux
          os: ubuntu-latest
          URL: aarch64-linux-musl
          OPENSSL_TARGET: linux-aarch64
          
        - target: x86_64-linux
          os: ubuntu-latest
          URL: x86_64-linux-musl
          OPENSSL_TARGET: linux-x86_64
          
        - target: i686-linux
          os: ubuntu-latest
          URL: i686-linux-musl
          OPENSSL_TARGET: linux-generic32
          
        - target: armv7-linux-eabihf
          os: ubuntu-latest
          URL: armv7l-linux-musleabihf
          OPENSSL_TARGET: linux-armv4
          
        - target: armv7-linux-eabi
          os: ubuntu-latest
          URL: armv7m-linux-musleabi
          OPENSSL_TARGET: linux-armv4
          
        - target: arm-linux-eabihf
          os: ubuntu-latest
          URL: arm-linux-musleabihf
          OPENSSL_TARGET: linux-armv4
          
        - target: arm-linux-eabi
          os: ubuntu-latest
          URL: arm-linux-musleabi
          OPENSSL_TARGET: linux-armv4
          
        - target: mipsel-linux
          os: ubuntu-latest
          URL: mipsel-linux-muslsf
          OPENSSL_TARGET: linux-mips32
          
        - target: mips-linux
          os: ubuntu-latest
          URL: mips-linux-muslsf
          OPENSSL_TARGET: linux-mips32
          
        - target: mips64-linux
          os: ubuntu-latest
          URL: mips64-linux-musl
          OPENSSL_TARGET: linux64-mips64
          
        - target: s390x-linux
          os: ubuntu-latest
          URL: s390x-linux-musl
          OPENSSL_TARGET: "linux64-s390x no-asm"
          
        - target: loongarch64-linux
          os: ubuntu-latest
          URL: loongarch64-linux-musl
          OPENSSL_TARGET: linux64-loongarch64

        - target: riscv32-linux
          os: ubuntu-latest
          URL: riscv32-linux-musl
          OPENSSL_TARGET: linux32-riscv32

        - target: riscv64-linux
          os: ubuntu-latest
          URL: riscv64-linux-musl
          OPENSSL_TARGET: linux64-riscv64

        # BSD 其中arm64系列全功能版构建时间最长
        - target: x86_64-freebsd
          os: ubuntu-latest
          arch: x86-64
          version: '15.0'
          URL: x86_64-freebsd
          OPENSSL_TARGET: BSD-x86_64
          
        - target: arm64-freebsd
          os: ubuntu-latest
          arch: arm64
          version: '15.0'
          URL: arm64-freebsd
          OPENSSL_TARGET: BSD-aarch64

        - target: x86_64-openbsd
          os: ubuntu-latest
          arch: x86-64
          version: '7.8'
          URL: x86_64-openbsd
          OPENSSL_TARGET: BSD-x86_64

        # arm64-openbsd 全功能版构建约需2小时35分
        - target: arm64-openbsd
          os: ubuntu-latest
          arch: arm64
          version: '7.8'
          URL: arm64-openbsd
          OPENSSL_TARGET: BSD-aarch64
        
        - target: x86_64-netbsd
          os: ubuntu-latest
          arch: x86-64
          version: '10.1'
          pkg_arch: x86_64
          URL: x86_64-netbsd
          OPENSSL_TARGET: BSD-x86_64

        - target: arm64-netbsd
          os: ubuntu-latest
          arch: arm64
          version: '10.1'
          pkg_arch: aarch64
          URL: arm64-netbsd
          OPENSSL_TARGET: BSD-aarch64

        # Mac
        - target: x86_64-macos
          os: macos-latest
          URL: x86_64-apple-darwin
          OPENSSL_TARGET: darwin64-x86_64-cc
          
        - target: arm64-macos
          os: macos-latest
          URL: arm64-apple-darwin
          OPENSSL_TARGET: darwin64-arm64-cc

        # Windows
        - target: x86_64-windows
          os: ubuntu-latest
          URL: x86_64-w64-mingw32
          OPENSSL_TARGET: "mingw64 no-quic"
          
        - target: i686-windows
          os: ubuntu-latest
          MSVC_ARCH: x86
          URL: i686-w64-mingw32
          OPENSSL_TARGET: "mingw no-quic"
          
        - target: arm64-windows
          os: ubuntu-latest
          URL: aarch64-w64-mingw32
          OPENSSL_TARGET: "mingwarm64 no-quic"

    runs-on: ${{ matrix.os }}
    env:
      URL: ${{ matrix.URL }}
      target: ${{ matrix.target }}
      OPENSSL_TARGET: ${{ matrix.OPENSSL_TARGET }}
    steps:
     - name: 📬 检出代码
       uses: actions/checkout@v6
       with:
         repository: 'n42n/n3n'
         ref: "${{ github.event.inputs.repo_ref }}"
         fetch-depth: 0
         submodules: recursive
         
     - name: ⛏ 编译 FreeBSD N3N
       if: ${{ endsWith(matrix.target, 'freebsd') }}
       uses: cross-platform-actions/action@master
       with:
         operating_system: freebsd
         architecture: ${{ matrix.arch }}
         version: ${{ matrix.version }}
         shell: bash
         memory: 5G
         cpu_count: 4
         run: |
              sudo pkg install -y gmake cmake autoconf automake libtool pkgconf wget curl git-tiny python3 jq bash
              export CC="clang"
              export CXX="clang++"
              export CFLAGS="-ffunction-sections -fdata-sections -O2 -w $CFLAGS -I/usr/local/include -I$(pwd)/thirdparty -static"
              export LDFLAGS="-s -Wl,--gc-sections $LDFLAGS -static"
              # 构建配置参数  
              CONFIGURE_FLAGS=""
              MAKE_FLAGS=""
              if [ "${{ github.event.inputs.enable_zstd }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-zstd"
                 curl -Lk -o zstd-1.5.7.tar.gz https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz || wget https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz
                 tar xf zstd-1.5.7.tar.gz --exclude '*/tests/*'
                 echo "######################编译zstd依赖库########################"
                 cd zstd-1.5.7/build/cmake
                 mkdir -p build
                 cd build
                 cmake .. \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DZSTD_BUILD_PROGRAMS=OFF \
                   -DZSTD_BUILD_SHARED=OFF \
                   -DZSTD_BUILD_STATIC=ON \
                   -DCMAKE_EXE_LINKER_FLAGS="-static" \
                   -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/thirdparty/zstd \
                   -DCMAKE_C_COMPILER=${CC:-clang} \
                   -DCMAKE_CXX_COMPILER=${CXX:-clang++}
                 cmake --build . --config Release --parallel
                 cmake --install .
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/zstd/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/zstd/lib"
              fi

              if [ "${{ github.event.inputs.enable_openssl }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-openssl"
                 curl -Lk -o openssl-3.6.1.tar.gz https://www.openssl.org/source/openssl-3.6.1.tar.gz || wget https://www.openssl.org/source/openssl-3.6.1.tar.gz
                 tar xf openssl-3.6.1.tar.gz --exclude='*/tests/*'
                 echo "######################编译openssl依赖库########################"
                 cd openssl-3.6.1
                 ./Configure ${{ matrix.OPENSSL_TARGET }} \
                   no-shared no-zlib no-tests --prefix=${GITHUB_WORKSPACE}/thirdparty/openssl \
                   LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              
                 gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 gmake install_sw
                 OPENSSL_DIR=${GITHUB_WORKSPACE}/thirdparty/openssl
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/openssl/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/openssl/lib"
              fi

              if [ "${{ github.event.inputs.enable_miniupnp }}" = "true" ]; then  
                 MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_MINIUPNPC=1"
                 export CFLAGS="$CFLAGS -I$(pwd)/thirdparty/miniupnp"
                 cp -r "$(pwd)/thirdparty/miniupnp/miniupnpc/include/." "$(pwd)/thirdparty/miniupnp/miniupnpc/"
                 echo "######################编译miniupnp依赖库########################"
                 cmake -S thirdparty/miniupnp/miniupnpc -B build-miniupnpc \
                   -DCMAKE_C_COMPILER=${CC} \
                   -DUPNPC_BUILD_SHARED=OFF \
                   -DUPNPC_BUILD_STATIC=ON \
                   -DUPNPC_BUILD_SAMPLE=OFF \
                   -DUPNPC_BUILD_TESTS=OFF \
                   -DCMAKE_POLICY_VERSION_MINIMUM=3.18 \
                   -DCMAKE_INSTALL_PREFIX=$(pwd)/thirdparty/miniupnp/miniupnpc/build
              
                 cmake --build build-miniupnpc -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 cmake --install build-miniupnpc
                 # 已经添加这个库 就明确定义已经集成
                 export CFLAGS="$CFLAGS -DHAVE_LIBMINIUPNPC=1"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc"
                 export LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/miniupnp/miniupnpc/build/lib -lminiupnpc"
              fi

              if [ "${{ github.event.inputs.enable_natpmp }}" = "true" ]; then  
                 MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_LIBNATPMP=1"
                 echo "######################编译libnatpmp依赖库########################"
                 cmake -S "$(pwd)/thirdparty/libnatpmp" -B "$(pwd)/thirdparty/libnatpmp" \
                   -DCMAKE_C_COMPILER=${CC} \
                   -DCMAKE_INSTALL_PREFIX="$(pwd)/thirdparty/libnatpmp" \
                   -DBUILD_SHARED_LIBS=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.18
              
                 cmake --build "$(pwd)/thirdparty/libnatpmp" --target natpmp -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 cmake --install "$(pwd)/thirdparty/libnatpmp"
                 ls -la thirdparty/libnatpmp/libnatpmp.a || echo "libnatpmp.a库文件不存在"
                 # 更新 LDFLAGS / CFLAGS 以便后续链接使用
                 export LDLIBS_EXTRA="$LDLIBS_EXTRA -lnatpmp"
                 LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/libnatpmp"
                 export CFLAGS="$CFLAGS -I$(pwd)/thirdparty/libnatpmp -DHAVE_LIBNATPMP=1"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/libnatpmp/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/libnatpmp/lib -lnatpmp"
              fi

              if [ "${{ github.event.inputs.enable_pcap }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pcap"
                 wget https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz
                 tar xzf libpcap-1.10.6.tar.gz
                 echo "######################编译libpcap依赖库########################"
                 cd libpcap-1.10.6
                 ./configure --disable-shared --prefix=${GITHUB_WORKSPACE}/thirdparty/pcap
              
                 gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 gmake install
                 cd ${GITHUB_WORKSPACE}
                 export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/thirdparty/pcap/lib/pkgconfig:${PKG_CONFIG_PATH}"
                 # 获取 libpcap 完整的静态链接标志，包含所有私有依赖（如 FreeBSD 15 上的 -libverbs）
                 PCAP_STATIC_LIBS=$(pkg-config --libs --static libpcap 2>/dev/null || echo "-lpcap")
                 echo "libpcap完整依赖库：$PCAP_STATIC_LIBS"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/pcap/include"
                 export LDFLAGS="$LDFLAGS $PCAP_STATIC_LIBS"
              fi

              if [ "${{ github.event.inputs.enable_libcap }}" = "true" ]; then
                 echo ""
                 echo "# BSD 内核不支持libcap #"
                 echo ""
              fi
              
              if [ "${{ github.event.inputs.enable_pthread }}" = "true" ]; then
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pthread"
                 export LDFLAGS="$LDFLAGS -lpthread"
              fi

              echo "########### 编译 N3N ###########"
              # 因src/n2n_port_mapping.c缺少头文件定义 stdint.h stddef.h n2n.h n2n_define.h 这里手动补上
              tmpfile=$(mktemp)
              printf '#include <stddef.h>\n#include <n3n/logging.h>\n#include "n2n.h"\n#include "n2n_define.h"\n' > $tmpfile
              cat src/n2n_port_mapping.c >> $tmpfile
              mv $tmpfile src/n2n_port_mapping.c
              ./autogen.sh 
              ./configure $CONFIGURE_FLAGS PREFIX=. CC="${CC}" LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4) PREFIX=. $MAKE_FLAGS
              ls -la apps/
              gmake install \
               PREFIX=. $MAKE_FLAGS \
               CONFIG_BINDIR=./bin \
               CONFIG_SBINDIR=./bin \
               ETCDIR=./bin \
               CONFIG_DOCDIR=./bin \
               CONFIG_MANDIR=./bin \
               CONFIG_SYSTEMDDIR=./bin

              # 复制示例配置文件进去
              cp doc/edge.conf.sample ./bin/ 2>/dev/null || true
              cp doc/supernode.conf.sample ./bin/ 2>/dev/null || true
          
              echo "### 编译 tools ####"
              gmake tools LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_EXTRA="${LDLIBS_EXTRA}" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include" 
           
              echo "### 安装 tools ####"
              gmake -C tools install CONFIG_SBINDIR=$(pwd)/bin INSTALL=install INSTALL_PROG="install -m 755" LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include"
              ls -la tools/
              
              file bin/n3n-edge || true
              ldd bin/n3n-edge || true
              ldd bin/n3n-portfwd || true
              bin/n3n-edge -h

     - name: ⛏ 编译 NetBSD N3N
       if: ${{ endsWith(matrix.target, 'netbsd') }}
       uses: cross-platform-actions/action@master
       with:
         operating_system: netbsd
         architecture: ${{ matrix.arch }}
         version: ${{ matrix.version }}
         shell: bash
         memory: 5G
         cpu_count: 4
         run: |
              # 软件库版本详情查看 https://cdn.netbsd.org/pub/pkgsrc/packages/NetBSD
              sudo PKG_PATH="https://cdn.NetBSD.org/pub/pkgsrc/packages/NetBSD/${{ matrix.pkg_arch }}/${{ matrix.version }}/All/" \
              pkg_add -u gcc14 cmake autoconf automake pkgconf libtool-2.4.7 git gmake jq python312 bash
              # 这里只能用gcc 因为clang在arm64无法静态编译
              export CC="gcc"
              export CXX="g++"
              # 传递Netbsd标志
              export CFLAGS="-ffunction-sections -fdata-sections -O2 -w $CFLAGS -I/usr/include -I/usr/local/include -I$(pwd)/thirdparty -static -D_BSD_SOURCE -D_DEFAULT_SOURCE -D_NETBSD_SOURCE"
              export LDFLAGS="-s -Wl,--gc-sections $LDFLAGS -L/usr/lib -L/usr/local/lib -static"
              # 构建配置参数  
              CONFIGURE_FLAGS=""
              MAKE_FLAGS=""
              if [ "${{ github.event.inputs.enable_zstd }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-zstd"
                 curl -Lk -o zstd-1.5.7.tar.gz https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz || wget https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz
                 tar xzf zstd-1.5.7.tar.gz
                 echo "######################编译zstd依赖库########################"
                 cd zstd-1.5.7/build/cmake
                 mkdir -p build
                 cd build
                 cmake .. \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DZSTD_BUILD_PROGRAMS=OFF \
                   -DZSTD_BUILD_SHARED=OFF \
                   -DZSTD_BUILD_STATIC=ON \
                   -DCMAKE_EXE_LINKER_FLAGS="-static" \
                   -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/thirdparty/zstd \
                   -DCMAKE_C_COMPILER=${CC:-gcc} \
                   -DCMAKE_CXX_COMPILER=${CXX:-g++}
                 cmake --build . --config Release -- -j4
                 cmake --install .
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/zstd/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/zstd/lib"
              fi

              if [ "${{ github.event.inputs.enable_openssl }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-openssl"
                 curl -Lk -o openssl-3.6.1.tar.gz https://www.openssl.org/source/openssl-3.6.1.tar.gz || wget https://www.openssl.org/source/openssl-3.6.1.tar.gz
                 tar xzf openssl-3.6.1.tar.gz
                 echo "######################编译openssl依赖库########################"
                 cd openssl-3.6.1
                 ./Configure ${{ matrix.OPENSSL_TARGET }} \
                   no-shared no-zlib no-tests --prefix=${GITHUB_WORKSPACE}/thirdparty/openssl \
                   LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              
                 #gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 gmake
                 gmake install_sw
                 OPENSSL_DIR=${GITHUB_WORKSPACE}/thirdparty/openssl
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/openssl/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/openssl/lib"
              fi

              if [ "${{ github.event.inputs.enable_miniupnp }}" = "true" ]; then  
                 MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_MINIUPNPC=1"
                 export CFLAGS="$CFLAGS -I$(pwd)/thirdparty/miniupnp"
                 cp -r "$(pwd)/thirdparty/miniupnp/miniupnpc/include/." "$(pwd)/thirdparty/miniupnp/miniupnpc/"
                 echo "######################编译miniupnp依赖库########################"
                 # 补齐头文件
                 awk '{print} /#include <stdio.h>/ {print "#if defined(__NetBSD__)\n#include <sys/ioctl.h>\n#include <net/if.h>\n#include <net/if_types.h>\n#include <netinet/in.h>\n#endif"}' thirdparty/miniupnp/miniupnpc/src/minissdpc.c > tmp.c && mv tmp.c thirdparty/miniupnp/miniupnpc/src/minissdpc.c
                 cmake -S thirdparty/miniupnp/miniupnpc -B build-miniupnpc \
                   -DCMAKE_C_COMPILER=${CC} \
                   -DUPNPC_BUILD_SHARED=OFF \
                   -DUPNPC_BUILD_STATIC=ON \
                   -DUPNPC_BUILD_SAMPLE=OFF \
                   -DUPNPC_BUILD_TESTS=OFF \
                   -DCMAKE_POLICY_VERSION_MINIMUM=3.18 \
                   -DCMAKE_INSTALL_PREFIX=$(pwd)/thirdparty/miniupnp/miniupnpc/build
              
                 cmake --build build-miniupnpc -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 cmake --install build-miniupnpc
                 # 已经添加这个库 就明确定义已经集成
                 export CFLAGS="$CFLAGS -DHAVE_LIBMINIUPNPC=1"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc"
                 export LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/miniupnp/miniupnpc/build/lib -lminiupnpc"
              fi

              if [ "${{ github.event.inputs.enable_natpmp }}" = "true" ]; then  
                 MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_LIBNATPMP=1"
                 echo "######################编译libnatpmp依赖库########################"
                 cmake -S "$(pwd)/thirdparty/libnatpmp" -B "$(pwd)/thirdparty/libnatpmp" \
                   -DCMAKE_C_COMPILER=${CC} \
                   -DCMAKE_INSTALL_PREFIX="$(pwd)/thirdparty/libnatpmp" \
                   -DBUILD_SHARED_LIBS=OFF -DCMAKE_POLICY_VERSION_MINIMUM=3.18
              
                 cmake --build "$(pwd)/thirdparty/libnatpmp" --target natpmp -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 cmake --install "$(pwd)/thirdparty/libnatpmp"
                 ls -la thirdparty/libnatpmp/libnatpmp.a || echo "libnatpmp.a库文件不存在"
                 # 更新 LDFLAGS / CFLAGS 以便后续链接使用
                 export LDLIBS_EXTRA="$LDLIBS_EXTRA -lnatpmp"
                 LDFLAGS="$LDFLAGS -L$(pwd)/thirdparty/libnatpmp"
                 export CFLAGS="$CFLAGS -I$(pwd)/thirdparty/libnatpmp -DHAVE_LIBNATPMP=1"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/libnatpmp/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/libnatpmp/lib -lnatpmp"
              fi

              if [ "${{ github.event.inputs.enable_pcap }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pcap"
                 curl -Lk -o libpcap-1.10.6.tar.gz https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz || wget https://www.tcpdump.org/release/libpcap-1.10.6.tar.gz
                 tar xzf libpcap-1.10.6.tar.gz
                 echo "######################编译libpcap依赖库########################"
                 cd libpcap-1.10.6
                 ./configure --disable-shared --prefix=${GITHUB_WORKSPACE}/thirdparty/pcap
              
                 gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 gmake install
                 cd ${GITHUB_WORKSPACE}
                 export PKG_CONFIG_PATH="${GITHUB_WORKSPACE}/thirdparty/pcap/lib/pkgconfig:${PKG_CONFIG_PATH}"
                 # 获取 libpcap 完整的静态链接标志，包含所有私有依赖
                 PCAP_STATIC_LIBS=$(pkg-config --libs --static libpcap 2>/dev/null || echo "-lpcap")
                 echo "libpcap完整依赖库：$PCAP_STATIC_LIBS"
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/pcap/include"
                 export LDFLAGS="$LDFLAGS $PCAP_STATIC_LIBS"
              fi

              if [ "${{ github.event.inputs.enable_libcap }}" = "true" ]; then
                 echo ""
                 echo "# BSD 内核不支持libcap #"
                 echo ""
              fi
              
              if [ "${{ github.event.inputs.enable_pthread }}" = "true" ]; then
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --enable-pthread"
                 export LDFLAGS="$LDFLAGS -lpthread"
              fi

              echo "########### 编译 N3N ###########"
              # 因src/n2n_port_mapping.c缺少头文件定义 stdint.h stddef.h n2n.h n2n_define.h 这里手动补上
              tmpfile=$(mktemp)
              printf '#include <stddef.h>\n#include <n3n/logging.h>\n#include "n2n.h"\n#include "n2n_define.h"\n' > $tmpfile
              cat src/n2n_port_mapping.c >> $tmpfile
              mv $tmpfile src/n2n_port_mapping.c
              ./autogen.sh 
              ./configure $CONFIGURE_FLAGS PREFIX=. CC="${CC}" LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4) PREFIX=. $MAKE_FLAGS
              ls -la apps/
              gmake install \
               PREFIX=. $MAKE_FLAGS \
               CONFIG_BINDIR=./bin \
               CONFIG_SBINDIR=./bin \
               ETCDIR=./bin \
               CONFIG_DOCDIR=./bin \
               CONFIG_MANDIR=./bin \
               CONFIG_SYSTEMDDIR=./bin

              # 复制示例配置文件进去
              cp doc/edge.conf.sample ./bin/ 2>/dev/null || true
              cp doc/supernode.conf.sample ./bin/ 2>/dev/null || true
          
              echo "### 编译 tools ####"
              gmake tools LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_EXTRA="${LDLIBS_EXTRA}" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include" 
           
              echo "### 安装 tools ####"
              gmake -C tools install CONFIG_SBINDIR=$(pwd)/bin INSTALL=install INSTALL_PROG="install -m 755" LDFLAGS="${LDFLAGS} -L$(pwd)/src -L$(pwd)/libs/connslot -lconnslot" LDLIBS_LOCAL="$LDLIBS_LOCAL -lconnslot" CFLAGS="${CFLAGS} -I${GITHUB_WORKSPACE}/include"
              ls -la tools/
              
              #strip bin/* || true
              file bin/n3n-edge || true
              ldd bin/n3n-edge || true
              ldd bin/n3n-portfwd || true
              bin/n3n-edge -h

     - name: ⛏ 编译 OpenBSD N3N
       if: ${{ endsWith(matrix.target, 'openbsd') }}
       uses: cross-platform-actions/action@master
       with:
         operating_system: openbsd
         architecture: ${{ matrix.arch }}
         version: ${{ matrix.version }}
         shell: bash
         memory: 5G
         cpu_count: 4
         run: |
              # 软件库版本详情查看 https://cdn.openbsd.org/pub/OpenBSD/版本/packages
              sudo pkg_add gmake cmake autoconf-2.71p0 automake-1.18 libtool wget python-3.12.11 curl git jq bash bison
              export AUTOCONF_VERSION=2.71
              export AUTOMAKE_VERSION=1.18
              export CC="clang"
              export CXX="clang++"
              export CFLAGS="-ffunction-sections -fdata-sections -O2 -w $CFLAGS -I/usr/local/include -I$(pwd)/thirdparty -static"
              export LDFLAGS="-s -Wl,--gc-sections $LDFLAGS -static"
              # 构建配置参数  
              CONFIGURE_FLAGS=""
              MAKE_FLAGS=""
              if [ "${{ github.event.inputs.enable_zstd }}" = "true" ]; then  
                 CONFIGURE_FLAGS="$CONFIGURE_FLAGS --with-zstd"
                 curl -Lk -o zstd-1.5.7.tar.gz https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz || wget https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz
                 tar xzf zstd-1.5.7.tar.gz
                 echo "######################编译zstd依赖库########################"
                 cd zstd-1.5.7/build/cmake
                 mkdir -p build
                 cd build
                 cmake .. \
                   -DCMAKE_BUILD_TYPE=Release \
                   -DZSTD_BUILD_PROGRAMS=OFF \
                   -DZSTD_BUILD_SHARED=OFF \
                   -DZSTD_BUILD_STATIC=ON \
                   -DCMAKE_EXE_LINKER_FLAGS="-static" \
                   -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/thirdparty/zstd \
                   -DCMAKE_C_COMPILER=${CC:-clang} \
                   -DCMAKE_CXX_COMPILER=${CXX:-clang++}
                 cmake --build . --config Release -- -j4
                 cmake --install .
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/zstd/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/zstd/lib"
