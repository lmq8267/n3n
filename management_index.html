<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel='icon' type='image/svg+xml'
        href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:rgb(124,58,237)"/><stop offset="100%" style="stop-color:rgb(6,182,212)"/></linearGradient></defs><rect width="48" height="48" rx="10" fill="url(%23g)"/><text x="24" y="32" font-family="Inter,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">N3N</text></svg>'>
    <title>n3n 网络管理控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --success-color: #48bb78;
            --warning-color: #f6ad55;
            --danger-color: #fc8181;
            --dark-bg: #1a202c;
            --light-bg: #f7fafc;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --border-color: #e2e8f0;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            animation: slideDown 0.6s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .control-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.8s ease-out;
        }

        .control-card h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: var(--success-color);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        .btn-warning {
            background: var(--warning-color);
            color: white;
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(246, 173, 85, 0.3);
        }

        .btn-danger {
            background: var(--danger-color);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(252, 129, 129, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .data-section {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }

        .data-section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            margin: 10px 0;
            box-sizing: border-box;
        }

        .password-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* 添加表格容器样式 */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            /* iOS 平滑滚动 */
            margin: 0 -10px;
            /* 抵消容器padding，让滚动条贴近屏幕边缘 */
            padding: 0 10px;
            /* 保持内容对齐 */
        }

        /* 现代化表格样式 */
        .modern-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            border: 1px solid var(--border-color);
            min-width: 600px;
            /* 设置最小宽度确保表格可读性 */
        }

        .modern-table th,
        .modern-table td {
            padding: 16px 12px;
            text-align: center;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .modern-table td:last-child,
        .modern-table th:last-child {
            border-right: none;
        }

        .modern-table th {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modern-table tbody tr:nth-child(even) {
            background-color: rgba(102, 126, 234, 0.05);
        }

        .modern-table tbody tr:nth-child(odd) {
            background-color: rgba(255, 255, 255, 0.8);
        }

        .modern-table tbody tr:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: scale(1.01);
            transition: all 0.2s ease;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            color: var(--primary-color);
            font-weight: 500;
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: var(--primary-color);
            font-size: 1rem;
        }

        .loading-pagination {
            color: var(--warning-color);
            font-style: italic;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-loading {
            position: relative;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            margin: -8px 0 0 -8px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease-out;
        }

        .modal-content {
            background: var(--card-bg);
            margin: 15% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s ease-out;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 25px 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-icon {
            font-size: 24px;
        }

        .modal-header h3 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        .modal-body {
            padding: 20px 25px;
        }

        .modal-body p {
            margin: 0 0 10px 0;
            color: var(--text-primary);
        }

        .modal-warning {
            color: var(--danger-color) !important;
            font-size: 0.9rem;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding: 15px 25px 20px;
        }

        .btn-secondary {
            background: #e2e8f0;
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #cbd5e0;
            transform: translateY(-1px);
        }

        .error {
            color: #d32f2f;
            text-align: center;
            padding: 10px;
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(72, 187, 120, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(72, 187, 120, 0);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .btn {
                flex: 1;
                width: auto;
                max-width: 180px;
                white-space: nowrap;
                font-size: 0.9rem;
                padding: 10px 16px;
                justify-content: center;
                text-align: center;
            }

            /* 强制按钮水平排列 */
            .btn-group {
                display: flex !important;
                flex-direction: row !important;
                flex-wrap: wrap;
                justify-content: center;
                gap: 8px;
            }

            .modern-table {
                font-size: 0.85rem;
                min-width: auto;
                width: 100%;
            }

            .modern-table th,
            .modern-table td {
                padding: 6px 4px;
                font-size: 0.8rem;
            }

            .table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -10px;
                padding: 0 10px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>n3n 网络管理控制台</h1>
            <p>实时监控和管理您的n3n网络</p>
        </div>

        <div class="controls">
            <div class="control-card">
                <h3>
                    <span class="status-indicator"></span>
                    最后更新时间
                </h3>
                <div id="time"
                    style="font-size: 1.2rem; font-weight: 600; color: var(--primary-color); text-align: center;">
                    <div class="loading"></div>
                </div>
                <div class="btn-group">
                    <button id="refreshButton" class="btn btn-primary" onclick="refresh_job()">
                        <span>🔄</span> 立即刷新
                    </button>
                    <button class="btn btn-danger" onclick="showStopConfirm()">
                        <span>⏹️</span> 停止运行
                    </button>
                </div>
            </div>

            <div class="control-card">
                <h3>
                    <span>📊</span>
                    日志详细级别
                </h3>
                <div id="verbose"
                    style="font-size: 1.2rem; font-weight: 600; color: var(--primary-color); text-align: center;">
                    <div class="loading"></div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-success" onclick="setverbose(verbose+1)">
                        <span>➕</span> 增加
                    </button>
                    <button class="btn btn-warning" onclick="setverbose(verbose-1)">
                        <span>➖</span> 减少
                    </button>
                </div>
            </div>
        </div>

        <div class="data-section">
            <h2>
                <span>🌐</span>
                社区信息
            </h2>
            <div id="communities">
                <div class="loading"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>
                <span>🔗</span>
                Edges/Peers
            </h2>
            <div id="edges">
                <div class="loading"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>
                <span>⭐</span>
                Supernodes
            </h2>
            <div id="supernodes">
                <div class="loading"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>
                <span>⏰</span>
                时间戳
            </h2>
            <div id="timestamps">
                <div class="loading"></div>
            </div>
        </div>

        <div class="data-section">
            <h2>
                <span>📈</span>
                数据包统计
            </h2>
            <div id="packetstats">
                <div class="loading"></div>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">⚠️</span>
                <h3>确认操作</h3>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">您确定要停止 n3n 服务吗？</p>
                <p class="modal-warning">这将断开所有网络连接并退出程序！</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-danger" id="confirmBtn">确定停止</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-icon">🔐</span>
                <h3 id="passwordModalTitle">需要密码验证</h3>
            </div>
            <div class="modal-body">
                <p id="passwordModalMessage">请输入管理密码：</p>
                <input type="text" id="passwordInput" class="password-input" placeholder="n3n"
                    autocomplete="current-password">
                <div id="passwordError" class="error" style="display:none;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePasswordModal()">取消</button>
                <button class="btn btn-primary" id="passwordConfirmBtn">确认</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // 点击模态框外部关闭  
        window.onclick = function (event) {
            const modal = document.getElementById('confirmModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // 页面初始化
        window.onload = function () {
            try {
                refresh_job(); // 立即获取数据
                refreshStartTime = Math.floor(Date.now() / 1000); // 页面加载时设置起始时间
                refresh_setup(300000); // 每5分钟刷新完整数据  
                startRealTimeClock(); // 启动实时时钟
            } catch (e) {
                console.error("初始化失败:", e);
            }
        };
    </script>
</body>

</html>
