     - name: 🔩 设置环境变量
       if: "!endsWith(matrix.target, 'bsd')"
       env:
        URL: ${{ matrix.URL }}
       shell: bash
       run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            export CFLAGS="-ffunction-sections -fdata-sections -O2 -w $CFLAGS \
              -I${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc \
              -I${GITHUB_WORKSPACE}/thirdparty/libnatpmp/include"
            export LDFLAGS="-s -Wl,--gc-sections $LDFLAGS \
              -L${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib64 \
              -L${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib-arm64 \
              -L${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/libcap-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc/build/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/libnatpmp/lib"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install autoconf automake libtool
            # 根据 matrix.target 指定架构
            if [[ "${{ matrix.target }}" == "arm64-macos" ]]; then
              export ARCH_FLAG="-arch arm64"
            else
              export ARCH_FLAG="-arch x86_64"
            fi
            export CC=${CC:-clang}
            export CXX=${CXX:-clang++}
            export CFLAGS="$ARCH_FLAG -O2 \
              -I${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc"
            export LDFLAGS="$ARCH_FLAG -L${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/pcap-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc/build/lib"
          else
            # Windows
            case "${{ matrix.target }}" in
              x86_64-windows)
                export CC=x86_64-w64-mingw32-gcc
                export CXX=x86_64-w64-mingw32-g++
                ;;
              i686-windows)
                export CC=i686-w64-mingw32-gcc
                export CXX=i686-w64-mingw32-g++
                ;;
              arm64-windows)
                export CC=aarch64-w64-mingw32-gcc
                export CXX=aarch64-w64-mingw32-g++
                ;;
              *)
                echo "未知 Windows target: ${{ matrix.target }}"
                exit 1
                ;;
            esac
            export CFLAGS="-O2 \
              -I${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/include \
              -I${GITHUB_WORKSPACE}/thirdparty/miniupnp/miniupnpc \
              -I/c/thirdparty/mingw-w64/include"
            export LDFLAGS="-L${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/lib \
              -L${GITHUB_WORKSPACE}/thirdparty/openssl-${URL}/lib \
              -L/c/mingw-w64/lib -static"
          fi
          if [[ "$RUNNER_OS" == "Linux" && "${{ matrix.target }}" =~ windows$ ]]; then
            # 为Windows添加特有库
            export WINDRES=${URL}-windres
            echo "WINDRES=${URL}-windres" >> $GITHUB_ENV
          fi
          echo "CC=$CC" >> $GITHUB_ENV
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "CFLAGS=$CFLAGS" >> $GITHUB_ENV
          echo "CXXFLAGS=$CFLAGS" >> $GITHUB_ENV
          echo "CPPFLAGS=$CFLAGS" >> $GITHUB_ENV
          echo "LDFLAGS=$LDFLAGS" >> $GITHUB_ENV

     - name: 🗃 缓存 zstd 库
       if: ${{ inputs.enable_zstd && !endsWith(matrix.target, 'bsd') }}
       id: cache-zstd
       uses: actions/cache@v5
       with:
        path: |
          thirdparty/zstd-${{ matrix.URL }}
        key: zstd-${{ matrix.URL }}-cache
     - name: ⛏ 编译 zstd 库
       if: ${{ inputs.enable_zstd && steps.cache-zstd.outputs.cache-hit != 'true' && !endsWith(matrix.target, 'bsd') }}
       env:
         TARGET: ${{ matrix.target }}
         URL: ${{ matrix.URL }}
       shell: bash
       run: |
         if [ ! -d "${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}" ] || [ -z "$(find ${GITHUB_WORKSPACE}/thirdparty/zstd-${URL}/lib -name '*.a' 2>/dev/null)" ] ; then
            curl -Lk -o zstd-1.5.7.tar.gz https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz || wget https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-1.5.7.tar.gz
            tar xf zstd-1.5.7.tar.gz --exclude='*/tests/*'
            echo "######################编译zstd依赖库########################"
            cd zstd-1.5.7/build/cmake
            mkdir -p build
            cd build
            # 交叉编译配置
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DZSTD_BUILD_PROGRAMS=OFF \
              -DZSTD_BUILD_SHARED=OFF \
              -DZSTD_BUILD_STATIC=ON \
              -DCMAKE_INSTALL_PREFIX=${GITHUB_WORKSPACE}/thirdparty/zstd-${URL} \
              -DCMAKE_C_COMPILER=${CC:-gcc} \
              -DCMAKE_CXX_COMPILER=${CXX:-g++}
            cmake --build . --config Release --parallel
            cmake --install .
         fi
         
