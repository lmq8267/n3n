                 tar xzf openssl-3.6.1.tar.gz
                 echo "######################编译openssl依赖库########################"
                 cd openssl-3.6.1
                 ./Configure ${{ matrix.OPENSSL_TARGET }} \
                   no-shared no-zlib no-tests --prefix=${GITHUB_WORKSPACE}/thirdparty/openssl \
                   LDFLAGS="${LDFLAGS}" CFLAGS="${CFLAGS}"
              
                 gmake -j$(getconf _NPROCESSORS_ONLN 2>/dev/null || echo 4)
                 gmake install_sw
                 OPENSSL_DIR=${GITHUB_WORKSPACE}/thirdparty/openssl
                 cd ${GITHUB_WORKSPACE}
                 export CFLAGS="$CFLAGS -I${GITHUB_WORKSPACE}/thirdparty/openssl/include"
                 export LDFLAGS="$LDFLAGS -L${GITHUB_WORKSPACE}/thirdparty/openssl/lib"
              fi

              if [ "${{ github.event.inputs.enable_miniupnp }}" = "true" ]; then  
                 MAKE_FLAGS="$MAKE_FLAGS THIRDPARTY_MINIUPNPC=1"
